# Active strategies, their mode, timeframe, and tunable params.
#   mode: off | shadow | live   (toggle live from the dashboard's Strategies tab)
#     off    — dormant
#     shadow — paper-trades signals to evaluate the strategy risk-free (default)
#     live   — trades the real account (only when not in global dry-run)
#   timeframe: 1m | 5m | 15m | 30m | 1h | 4h | 1d
#     Each strategy runs on its assigned timeframe (candles are fetched at that frequency)
#
# learning/optimizer.py + llm/reflection.py may propose param updates, which
# (after the evaluator gates them) get written back to config/strategies.yaml.
#
# ── Curated default pool ───────────────────────────────────────────────────────
# 8 strategies with distinct hypotheses run in shadow by default; everything else
# starts OFF. Rationale (from live shadow evidence + cost realities):
#   • M1/M5 signals rarely clear retail CFD spreads — the always-on defaults now
#     sit on M15+ where the expected move per trade actually exceeds the cost;
#   • near-duplicates (six hma_dc_* variants, four fvg_* variants, two scalps)
#     mostly produce correlated noise that drowns the learning layers. One
#     representative per idea stays on; the rest remain available and can be
#     re-enabled from the dashboard at any time.
# Signals are edge-triggered and evaluated once per closed bar, so a condition
# that holds for 10 bars produces one trade, not ten.

strategies:
  # ── Curated pool (shadow) ── one representative per hypothesis ──
  - name: trend_following        # EMA-cross trend following (H1)
    mode: shadow
    timeframe: 1h
    symbols: []
    params:
      fast_ema: 20
      slow_ema: 50
      atr_period: 14
      min_conviction: 0.3

  - name: mean_reversion         # RSI + Bollinger reversion (M15)
    mode: shadow
    timeframe: 15m
    symbols: []
    params:
      rsi_period: 14
      rsi_oversold: 30
      rsi_overbought: 70
      bb_period: 20
      bb_std: 2.0

  - name: multi_bb               # Bollinger squeeze/expansion — best live win rate (56%)
    mode: shadow
    timeframe: 15m               # was 1m; moved above the cost floor
    symbols: []
    params:
      period_bb: 20

  - name: fvg_m30                # fair-value-gap fill — best live win rate at M30 (59%)
    mode: shadow
    timeframe: 30m
    symbols: []
    params:
      lookback: 50
      min_body_ratio: 0.5

  - name: bb_rsi                 # Bollinger + RSI confirmation (M15, 57% live)
    mode: shadow
    timeframe: 15m
    symbols: []
    params:
      period_bb: 20
      period_rsi: 11

  - name: macd_stoch             # MACD + stochastic momentum
    mode: shadow
    timeframe: 15m               # was 1m; moved above the cost floor
    symbols: []
    params:
      period_macd_fast: 13
      period_macd_slow: 26

  - name: hma_dc_h1              # Hull MA + Donchian trend (H1 representative)
    mode: shadow
    timeframe: 1h
    symbols: []
    params:
      period_hma: 55
      period_donchian: 20

  - name: cci_reversal           # CCI extreme reversal (H1)
    mode: shadow
    timeframe: 1h
    symbols: []
    params:
      period_cci: 14
      threshold: 100

  # ── New EMA strategies (shadow, independently attributed at M5 and M15) ──
  - name: ema921_adx_dmi_m5
    mode: shadow
    timeframe: 5m
    symbols: []
    params:
      adx_threshold: 25
      conviction_base: 0.55

  - name: ema921_adx_dmi_m15
    mode: shadow
    timeframe: 15m
    symbols: []
    params:
      adx_threshold: 25
      conviction_base: 0.55

  - name: ema78_crossover_m5
    mode: shadow
    timeframe: 5m
    symbols: []
    params:
      conviction_base: 0.55

  - name: ema78_crossover_m15
    mode: shadow
    timeframe: 15m
    symbols: []
    params:
      conviction_base: 0.55

  # ── Bench (off by default; enable from the dashboard to trial) ──
