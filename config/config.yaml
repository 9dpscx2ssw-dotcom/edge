# Gungnir runtime config. Copy to config/config.yaml and edit.
# Secrets come from .env, NOT here.

agent:
  fast_loop_seconds: 30      # sense → decide → act cadence
  slow_loop_seconds: 3600    # learning / reflection / optimization cadence
  dry_run: false              # paper trading; override with GUNGNIR_DRY_RUN

# Markets to trade. `symbol` is the Capital.com *epic* (used directly by the live
# feed) and also seeds the synthetic feed in paper mode, so these populate the
# dashboard in either mode. Fifteen liquid defaults ship enabled; the rest are
# listed but off. Every active strategy runs on every enabled symbol across its
# timeframe, so N symbols ≈ N× the per-loop API calls — enable more rows only
# after checking loop_seconds in status.json stays inside fast_loop_seconds.
